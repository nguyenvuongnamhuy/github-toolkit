<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Toolkit</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="container">
    <header>
      <img src="../icons/icon48.png" alt="logo" class="logo" />
      <h1>GitHub Toolkit</h1>
    </header>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="init">🌿 Init Branch</button>
      <button class="tab-btn" data-tab="create">🔀 Create PRs</button>
      <button class="tab-btn" data-tab="approve">📋 Manage PRs</button>
    </div>

    <!-- Tab 0: Init Branch -->
    <div class="tab-panel" id="tab-init">
      <div class="branch-inputs">
        <div class="input-group">
          <label class="input-label">New branch</label>
          <input type="text" id="init-new-branch" class="branch-input" placeholder="e.g. base/my-feature" />
        </div>
        <span class="branch-arrow">→</span>
        <div class="input-group">
          <label class="input-label">Base branch</label>
          <input type="text" id="init-base-branch" class="branch-input" value="dev, develop" />
        </div>
      </div>
      <div class="input-group" style="margin-bottom: 8px;">
        <label class="input-label">Search repos</label>
        <input type="text" id="init-search" class="branch-input" placeholder="Filter by repo name..." />
      </div>
      <div id="init-repo-list" class="init-repo-list"></div>
      <div class="actions">
        <button id="init-btn" class="btn btn-primary">🌿 Init</button>
        <button id="delete-branch-btn" class="btn btn-danger">🗑 Delete</button>
      </div>
      <div id="init-status" class="global-status hidden"></div>
      <div id="init-result-list" class="result-list"></div>
    </div>

    <!-- Tab 1: Create PRs -->
    <div class="tab-panel hidden" id="tab-create">
      <div class="branch-inputs">
        <div class="input-group">
          <label class="input-label">From branch</label>
          <input type="text" id="from-branch" class="branch-input" placeholder="e.g. test" />
        </div>
        <div class="input-group">
          <label class="input-label">To branch</label>
          <input type="text" id="to-branch" class="branch-input" placeholder="e.g. release, uat, stage" />
        </div>
      </div>
      <div class="actions">
        <button id="create-btn" class="btn btn-primary">🔀 Create PRs</button>
        <button id="copy-prs-btn" class="btn btn-secondary hidden">📋 Copy PRs</button>
        <button id="create-clear-btn" class="btn btn-secondary">🗑 Clear</button>
      </div>
      <div id="create-status" class="global-status hidden"></div>
      <div id="create-result-list" class="result-list"></div>
    </div>

    <!-- Tab 2: Manage PRs -->
    <div class="tab-panel hidden" id="tab-approve">
      <label class="textarea-label">Paste PR URLs (one per line)</label>
      <textarea id="pr-textarea" class="pr-textarea"
        placeholder="https://github.com/owner/repo/pull/1&#10;https://github.com/owner/repo/pull/2&#10;..." rows="8"
        spellcheck="false"></textarea>

      <div class="actions">
        <button id="check-status-btn" class="btn btn-secondary">🔍 Check Status</button>
        <button id="approve-btn" class="btn btn-primary">✅ Approve All</button>
        <button id="merge-btn" class="btn btn-primary">🔀 Merge All</button>
        <button id="clear-btn" class="btn btn-secondary">🗑 Clear</button>
      </div>

      <div id="global-status" class="global-status hidden"></div>
      <div id="result-list" class="result-list"></div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="popup.js"></script>
  <script src="github-api.js"></script>
  <script src="init-branch.js"></script>
  <script src="manage-prs.js"></script>
  <script src="create-prs.js"></script>
</body>

</html>
